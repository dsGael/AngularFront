<article class="tarjeta">
	<p class="tarjeta__label">Tarjeta de presentación</p>

	<h2 class="tarjeta__nombre">{{ nombre }}</h2>
	<p class="tarjeta__edad">Edad: {{ edad }} años</p>

	<div class="tarjeta__acciones">
		<button type="button" (click)="incrementarLikes()">Me gusta</button>
		<span>{{ likes }} likes</span>
	</div>
</article>
